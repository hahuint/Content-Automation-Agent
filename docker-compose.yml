services:
  agent:
    build: .
    container_name: content_agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./.env:/app/.env
      - ./agent_audit.db:/app/agent_audit.db
      - ./facebook_cookies.pkl:/app/facebook_cookies.pkl
    stdin_open: true 
    tty: true
